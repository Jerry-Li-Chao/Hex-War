<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0f0d" />
    <title>Cellularis</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="lab-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>CELLULARIS</span>
        </div>
        <div class="header-actions">
          <span class="live-mark"><i></i><span id="growthStatus">拖动活性细胞以建立连接</span></span>
          <button id="layoutModeButton" class="layout-mode-button" type="button" aria-pressed="false">拖动模式</button>
        </div>
      </header>

      <section class="stage" id="stage" aria-label="可拖拽的细胞分形生长画布">
        <canvas id="gameCanvas" role="img" aria-label="细胞生长结构"></canvas>

        <div class="canvas-meta faction-balance" id="factionBalance" aria-label="双方细胞数量比例">
          <div class="balance-track" aria-hidden="true">
            <span class="balance-player" id="playerBalanceFill"></span>
            <span class="balance-enemy" id="enemyBalanceFill"></span>
          </div>
          <div class="balance-values">
            <span id="playerBalanceCount">我方 2</span>
            <span id="enemyBalanceCount">敌方 2</span>
          </div>
          <span class="coordinates" id="coordinates">X 000 · Y 000</span>
        </div>

        <aside class="readout" aria-live="polite">
          <div class="readout-identity"><small id="selectedFaction">我方群落</small></div>
          <div><span id="cellCount">1 / 259</span><small>细胞</small></div>
          <div><span id="generationCount">LEVEL 1</span><small>等级</small></div>
          <div><span id="replicationRate">2s</span><small>复制间隔</small></div>
          <div><span id="transferRate">1.75s</span><small>传输间隔</small></div>
          <div><span id="fpsCount">--</span><small>FPS</small></div>
        </aside>

        <div class="pan-hint" id="panHint">
          <span class="pan-icon" aria-hidden="true">↔</span>
          建链：从任一活性膜拖向另一群落 · 布局：开启拖动模式后移动群落
        </div>

        <nav class="view-tools" aria-label="画布缩放控制">
          <button id="zoomIn" type="button" aria-label="放大">＋</button>
          <button id="zoomOut" type="button" aria-label="缩小">−</button>
          <button id="resetView" class="reset-view" type="button">全览</button>
        </nav>
      </section>

    </main>
    <script src="./app.js?v=faction-balance-5"></script>
  </body>
</html>
